<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Trading Hub</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: #000;
  color:#fff;
}

/* HEADER */
.hero {
  text-align:center;
  padding:40px 20px;
}
.hero h1 {
  font-size:40px;
  font-weight:bold;
  letter-spacing:2px;
  color:#fff;
}
.hero span {
  color:#00aaff;
}

/* CARD */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card {
  background:#0b0f1a;
  border-radius:15px;
  padding:20px;
  width:260px;
  box-shadow:0 0 20px rgba(0,170,255,0.3);
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
}
.card h3 {
  margin:10px 0;
}
.price {
  font-size:22px;
  color:#00aaff;
  margin:10px 0;
}
.btn {
  background:#00aaff;
  color:#fff;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:#0b0f1a;
  padding:20px;
  border-radius:15px;
  width:300px;
}
.copy-btn {
  background:#00aaff;
  border:none;
  padding:5px 10px;
  margin-left:10px;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>FLASH <span>USDT</span></h1>
</div>

<div class="container">

  <div class="card">
    <h3>3000 USDT</h3>
    <div class="price">$25</div>
    <button class="btn" onclick="openModal()">Buy Now</button>
  </div>

  <div class="card">
    <h3>6000 USDT</h3>
    <div class="price">$35</div>
    <button class="btn" onclick="openModal()">Buy Now</button>
  </div>

  <div class="card">
    <h3>10,000 USDT</h3>
    <div class="price">$50</div>
    <button class="btn" onclick="openModal()">Buy Now</button>
  </div>

  <div class="card">
    <h3>15,000 USDT</h3>
    <div class="price">$80</div>
    <button class="btn" onclick="openModal()">Buy Now</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Payment Method</h3>

    <p>BEP20:</p>
    <input value="YOUR_BEP20_ADDRESS" id="bep">
    <button class="copy-btn" onclick="copyText('bep')">Copy</button>

    <p>TRC20:</p>
    <input value="YOUR_TRC20_ADDRESS" id="trc">
    <button class="copy-btn" onclick="copyText('trc')">Copy</button>

    <p>Easypaisa:</p>
    <input value="YOUR_NUMBER" id="easy">
    <button class="copy-btn" onclick="copyText('easy')">Copy</button>

    <p>Bank Transfer:</p>
    <input value="YOUR_ACCOUNT" id="bank">
    <button class="copy-btn" onclick="copyText('bank')">Copy</button>

    <br><br>

    <input type="file" id="proof">
    <button class="btn" onclick="sendProof()">Upload Proof</button>

    <br><br>
    <button class="btn" onclick="closeModal()">Close</button>

  </div>
</div>

<!-- WHATSAPP -->
<div class="whatsapp" onclick="openWhatsApp()">
  💬
</div>

<script>

function openModal(){
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

function copyText(id){
  let copyText = document.getElementById(id);
  copyText.select();
  document.execCommand("copy");
  alert("Copied!");
}

function openWhatsApp(){
  window.open("https://wa.me/923300258291");
}

// TELEGRAM ALERT
function sendProof(){
  let message = "New Payment Proof Uploaded";

  fetch("https://api.telegram.org/botYOUR_BOT_TOKEN/sendMessage",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:"YOUR_CHAT_ID",
      text:message
    })
  });

  alert("Proof Submitted!");
}

</script>

</body>
</html>
