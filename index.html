<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash USDT</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

/* HEADER */
h1 {
  text-align:center;
  margin-top:30px;
  font-size:40px;
}
h1 span {
  color:#00aaff;
}

/* CARDS */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card {
  background:#0b0f1a;
  padding:20px;
  border-radius:15px;
  width:260px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,170,255,0.4);
}

.price {
  color:#00aaff;
  font-size:20px;
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:#00aaff;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#0b0f1a;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input {
  width:70%;
  padding:5px;
}

.copy {
  background:#00aaff;
  border:none;
  padding:5px;
  margin-left:5px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

</div>

<div class="card">

</div>

<div class="card">

<button onclick="closeModal()">Close</button>

</div>

<!-- WHATSAPP -->
<div class="whatsapp" onclick="whatsapp()">💬</div>

<script>

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function copy(id){
  let text = document.getElementById(id);
  text.select();
  document.execCommand("copy");

function whatsapp(){

</html>
